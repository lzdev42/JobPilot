name: Build Compose Multiplatform App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  release:
    types: [published]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            platform: linux
            build_command: ./gradlew packageDeb packageRpm
            artifact_path: |
              composeApp/build/compose/binaries/main/deb/*.deb
              composeApp/build/compose/binaries/main/rpm/*.rpm
          - os: windows-latest
            platform: windows
            build_command: ./gradlew.bat packageMsi packageExe
            artifact_path: |
              composeApp/build/compose/binaries/main/msi/*.msi
              composeApp/build/compose/binaries/main/exe/*.exe
          - os: macos-latest
            platform: macos
            build_command: ./gradlew packageDmg packagePkg
            artifact_path: |
              composeApp/build/compose/binaries/main/dmg/*.dmg
              composeApp/build/compose/binaries/main/pkg/*.pkg

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4.1.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew (Unix)
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      - name: Build and package application
        run: ${{ matrix.build_command }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.4.3
        with:
          name: ${{ matrix.platform }}-build
          path: ${{ matrix.artifact_path }}
          retention-days: 30

  release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: artifacts

      - name: Upload to Release
        uses: softprops/action-gh-release@v2.0.9
        with:
          files: |
            artifacts/linux-build/*
            artifacts/windows-build/*
            artifacts/macos-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  parallel-build:
    if: github.event_name != 'release'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4.1.2
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test

      - name: Build all platforms (if supported)
        run: ./gradlew build
