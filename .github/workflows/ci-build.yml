name: Build and Package Compose Multiplatform macOS Release

# 触发条件：推送到 main 分支或向 main 分支发起 Pull Request 时触发
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-macos:
    # 只在 macOS 上运行
    runs-on: macos-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 21 环境 (使用 Amazon Corretto)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto' # 使用 Amazon Corretto

      # 3. 缓存 Gradle 依赖，加快构建速度
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-macos-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-macos-

      # 4. 赋予 Gradle Wrapper 执行权限
      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # 5. 执行您的自定义构建命令
      - name: Build Release Distribution
        run: ./gradlew packageReleaseDistributionForCurrentOS

      # 6. 上传 macOS 构建产物 (DMG)
      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-macos
          path: composeApp/build/compose/binaries/*.dmg
