name: Build and Package Desktop Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- macOS 任务 ---
          # Intel (x86_64) 架构: 使用 macos-13 Runner
          - platform: macos
            os: macos-13
            arch: x86_64
          # Apple Silicon (arm64) 架构: 使用 macos-latest (即 macos-14)
          - platform: macos
            os: macos-latest
            arch: arm64
          # --- Linux 任务 ---
          # Intel/AMD (x86_64) 架构
          - platform: linux
            os: ubuntu-latest
            arch: x86_64
          # arm64 架构 (通过 QEMU 模拟)
          - platform: linux
            os: ubuntu-latest
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 21 环境 (Amazon Corretto)
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      # 3. 缓存 Gradle 依赖
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ matrix.platform }}-${{ matrix.arch }}-

      # 4. 执行构建 (标准方式)
      - name: Build for ${{ matrix.platform }} (${{ matrix.arch }})
        if: matrix.arch != 'arm64' || matrix.platform != 'linux'
        run: |
          chmod +x ./gradlew
          ./gradlew packageReleaseDistributionForCurrentOS

      # 4.1. 执行构建 (Linux arm64 模拟方式)
      - name: Build for Linux (arm64 via QEMU)
        if: matrix.platform == 'linux' && matrix.arch == 'arm64'
        uses: uraimo/run-on-arch-action@v1
        with:
          arch: aarch64
          distro: ubuntu22.04
          run: |
            apt-get update && apt-get install -y openjdk-21-jdk git
            export JAVA_HOME=/usr/lib/jvm/java-21-openjdk-amd64
            git clone https://github.com/${{ github.repository }}.git .
            git checkout ${{ github.sha }}
            chmod +x ./gradlew
            ./gradlew packageReleaseDistributionForCurrentOS

      # 5. 上传 macOS 构建产物
      - name: Upload macOS Artifact (${{ matrix.arch == 'arm64' && 'Silicon' || matrix.arch }})
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-macos-${{ matrix.arch == 'arm64' && 'Silicon' || matrix.arch }}
          path: composeApp/build/compose/binaries/main-release/dmg/*.dmg

      # 6. 上传 Linux 构建产物
      - name: Upload Linux Artifact (${{ matrix.arch == 'arm64' && 'Silicon' || matrix.arch }})
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-linux-${{ matrix.arch == 'arm64' && 'Silicon' || matrix.arch }}
          path: composeApp/build/compose/binaries/main-release/appimage/*.AppImage
