# 工作流名称
name: Build and Package Compose Multiplatform Desktop Release

# 触发条件：推送到 main 分支或向 main 分支发起 Pull Request 时触发
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    # 使用矩阵策略，在三个不同的操作系统上并行运行
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # 步骤 1: 检出你的代码库
      - name: Checkout code
        uses: actions/checkout@v4

      # 步骤 2: 设置 Java (JDK 21) 环境
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 步骤 3: 缓存 Gradle 依赖，加快构建速度
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 步骤 4: 为 Gradle Wrapper 赋予执行权限 (仅在 Linux 和 macOS 上需要)
      - name: Make gradlew executable
        if: matrix.os != 'windows-latest'
        run: chmod +x ./gradlew

      # 步骤 5: 根据当前操作系统，执行相应的打包命令
      - name: Build and Package Release
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            ./gradlew packageDmg
          elif [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            ./gradlew packageAppImage
          elif [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            # 在 Windows 上，我们使用 gradlew.bat
            ./gradlew.bat packageMsi
          fi
        # 在所有平台上都使用 bash shell 来执行 run 命令
        shell: bash

      # 步骤 6.1: 上传 macOS 构建产物 (DMG)
      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-macos
          path: composeApp/build/compose/binaries/release/dmg/*.dmg

      # 步骤 6.2: 上传 Linux 构建产物 (AppImage)
      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-linux
          path: composeApp/build/compose/binaries/release/app/*.AppImage

      # 步骤 6.3: 上传 Windows 构建产物 (MSI)
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-windows
          path: composeApp/build/compose/binaries/release/msi/*.msi
