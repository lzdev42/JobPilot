name: Build and Package Compose Multiplatform Desktop Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 JDK 21
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3. 缓存 Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      # 4. 赋予 Gradle 执行权限 (非 Windows)
      - name: Make gradlew executable
        if: matrix.os != 'windows-latest'
        run: chmod +x ./gradlew

      # 5. 执行您的自定义构建命令
      - name: Build Release Distribution
        run: ./gradlew packageReleaseDistributionForCurrentOS

      # 6. Windows: 压缩 app 目录为 ZIP
      - name: Zip app directory (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          cd composeApp/build/compose/binaries
          zip -r app.zip app
        shell: bash

      # 7. 上传 macOS 构建产物 (DMG)
      - name: Upload macOS Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-macos
          path: composeApp/build/compose/binaries/*.dmg

      # 8. 上传 Linux 构建产物 (AppImage)
      - name: Upload Linux Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-linux
          path: composeApp/build/compose/binaries/*.AppImage

      # 9. 上传 Windows 构建产物 (ZIP)
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact-windows
          path: composeApp/build/compose/binaries/app.zip
